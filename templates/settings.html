{% extends 'base.html' %}
{% block title %}Site Settings - AI Blog CMS{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h1 class="mb-4">Site Settings</h1>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Site Title</label>
        <input type="text" class="form-control" name="site_title" value="{{ settings.site_title }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Tagline</label>
        <input type="text" class="form-control" name="site_tagline" value="{{ settings.site_tagline }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="site_description" rows="4">{{ settings.site_description }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Admin Email</label>
        <input type="email" class="form-control" name="admin_email" value="{{ settings.admin_email }}">
      </div>
      <button type="submit" class="btn btn-primary">Save Settings</button>
    </form>
  </div>
</div>
{% endblock %}
