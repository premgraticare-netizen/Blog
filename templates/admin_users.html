{% extends 'base.html' %}
{% block title %}Admin Users - AI Blog CMS{% endblock %}
{% block content %}
<h1 class="mb-4">Admin Users</h1>
<div class="card shadow-sm">
  <div class="card-body">
    <table class="table table-striped">
      <thead><tr><th>Username</th><th>Email</th><th>Joined</th></tr></thead>
      <tbody>
        {% for user in users %}
        <tr><td>{{ user.username }}</td><td>{{ user.email }}</td><td>{{ user.created_at.strftime('%Y-%m-%d') }}</td></tr>
        {% else %}
        <tr><td colspan="3">No users yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
